name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_SHEET_CSV_URL: https://docs.google.com/spreadsheets/d/1Z4jBsqIaLjKpDf-aD7P1Y-9dwimbNWtNi06XyisU1N4/export?format=csv&gid=0
          VITE_GOOGLE_SHEET_STATS_CSV_URL: https://docs.google.com/spreadsheets/d/1Z4jBsqIaLjKpDf-aD7P1Y-9dwimbNWtNi06XyisU1N4/export?format=csv&gid=209678500

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
